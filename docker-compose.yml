services:
  db:
    image: pgvector/pgvector:pg16
    container_name: study-os-thesis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thesis}
      POSTGRES_DB: ${POSTGRES_DB:-thesis}
    ports:
      # Host port 5433 to avoid clashing with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thesis} -d ${POSTGRES_DB:-thesis}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
