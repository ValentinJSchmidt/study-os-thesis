name: Code Quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.py"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[actions]"

      - name: Ruff Lint
        run: ruff check .

      - name: Ruff Format Check
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install project with dev dependencies
        run: pip install -e ".[actions]"
      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q
