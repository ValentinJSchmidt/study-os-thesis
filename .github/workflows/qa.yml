name: Code Quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.py"

# The Python project lives in backend/ (pyproject.toml + uv.lock there).
defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Ruff Lint
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    # The test suite mocks all I/O (DB, Redis, LLM), so no service containers are
    # needed. These values only satisfy required settings at import time.
    env:
      DATABASE_URL: "postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci"
      JWT_SECRET: "ci-placeholder-secret-not-for-production-1234567890"
      REDIS_URL: "redis://127.0.0.1:6379/0"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --maxfail=1 --disable-warnings -q
